[tool.pytest.ini_options]
testpaths = ["src"]
python_files = ["test_*.py"]
addopts = "--strict-markers"

[tool.coverage.run]
branch = true
source = ["src"]
omit = ["src/test_*.py", "src/release/*", "release/*"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 40

[tool.ruff]
target-version = "py310"
line-length = 120
exclude = ["release", "src/dist", "src/build"]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
allow_untyped_defs = true
allow_incomplete_defs = true
check_untyped_defs = false
warn_unused_ignores = false
exclude = "(^release/|^src/test_)"
