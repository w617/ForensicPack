name: Verify v2.1.1 Release

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/verify-v211-release.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download published release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v2.1.1
        shell: bash
        run: |
          for attempt in $(seq 1 18); do
            rm -rf release-assets
            mkdir release-assets
            if gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets; then
              gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body > release-body.md
              exit 0
            fi
            if [ "$attempt" -eq 18 ]; then
              echo "Release $RELEASE_TAG was not available after all attempts."
              exit 1
            fi
            sleep 10
          done

      - name: Verify package, checksum, SBOM, and release notes
        env:
          RELEASE_TAG: v2.1.1
        shell: bash
        run: |
          package="ForensicPack-${RELEASE_TAG}-windows.zip"
          checksum="${package}.sha256"
          sbom="ForensicPack-${RELEASE_TAG}-sbom.cdx.json"
          test -s "release-assets/$package"
          test -s "release-assets/$checksum"
          test -s "release-assets/$sbom"
          (cd release-assets && sha256sum -c "$checksum")
          python - <<'PY'
          import json
          from pathlib import Path

          sbom_files = list(Path("release-assets").glob("*-sbom.cdx.json"))
          if len(sbom_files) != 1:
              raise SystemExit("Expected exactly one CycloneDX SBOM")
          payload = json.loads(sbom_files[0].read_text(encoding="utf-8"))
          if payload.get("bomFormat") != "CycloneDX":
              raise SystemExit("Invalid CycloneDX SBOM")

          notes = Path("release-body.md").read_text(encoding="utf-8")
          required = [
              "Protected planned sidecars from overwrite",
              "Excluded every split 7-Zip volume",
              "Kept no-hash reports consistent",
              "Honored portable or custom 7-Zip paths",
          ]
          missing = [text for text in required if text not in notes]
          if missing:
              raise SystemExit(f"Missing release-note sections: {missing}")
          print("Release package, checksum, SBOM, and curated notes verified.")
          PY

      - name: Record verification on PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh pr comment 4 --repo "$GITHUB_REPOSITORY" --body "Release **v2.1.1** verified successfully. The published Windows ZIP matched its SHA-256 sidecar, the SBOM parsed as CycloneDX, and the GitHub Release body contains the curated v2.1.1 fix and upgrade notes. Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
