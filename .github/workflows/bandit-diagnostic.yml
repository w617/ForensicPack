name: Bandit Diagnostic

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --quiet bandit==1.9.2
      - name: Scan integrity modules
        working-directory: src
        run: python3 -m bandit -ll hashing.py forensic_inventory.py content_verification.py sidecars.py audit.py transfer.py archivers.py

  orchestration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --quiet bandit==1.9.2
      - name: Scan orchestration modules
        working-directory: src
        run: python3 -m bandit -ll core.py core_v2.py engine.py models.py safety.py state_db.py utils.py reporting.py

  interface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --quiet bandit==1.9.2
      - name: Scan CLI and GUI modules
        working-directory: src
        shell: bash
        run: python3 -m bandit -ll cli.py forensicpack.py gui.py gui_state.py gui_assets.py app_metadata.py gui_components/*.py
