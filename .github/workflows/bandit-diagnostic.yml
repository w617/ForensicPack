name: Bandit Diagnostic

on:
  push:
    branches:
      - feature/forensic-hardening-v2.1.0

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: python -m pip install --quiet bandit==1.9.2
      - name: Generate report
        continue-on-error: true
        working-directory: src
        run: python -m bandit -r . -x "./test_*.py,./build,./dist" -ll -f json -o ../bandit-report.json
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
