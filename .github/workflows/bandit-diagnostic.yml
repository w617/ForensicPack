name: Bandit Diagnostic

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  hashing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --quiet bandit==1.9.2
      - working-directory: src
        run: python3 -m bandit -ll hashing.py content_verification.py

  package-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --quiet bandit==1.9.2
      - working-directory: src
        run: python3 -m bandit -ll sidecars.py audit.py

  transfer-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --quiet bandit==1.9.2
      - working-directory: src
        run: python3 -m bandit -ll transfer.py archivers.py

  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install --quiet bandit==1.9.2
      - working-directory: src
        run: python3 -m bandit -ll forensic_inventory.py
