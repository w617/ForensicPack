name: Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) { $tag = $tag.Substring(1) }
          $versionLine = Select-String -Path "src/version.py" -Pattern '^APP_VERSION\s*=\s*"(.+)"' | Select-Object -First 1
          if (-not $versionLine) { throw "APP_VERSION not found in src/version.py" }
          $version = $versionLine.Matches[0].Groups[1].Value
          if ($version -ne $tag) { throw "Tag v$tag does not match APP_VERSION $version" }

      - name: Build executable and run tests
        shell: pwsh
        working-directory: src
        run: ./scripts/build_windows.ps1

      - name: Smoke launch packaged executable
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "src/dist/ForensicPack/ForensicPack.exe" -PassThru
          Start-Sleep -Seconds 4
          if ($process.HasExited -and $process.ExitCode -ne 0) { throw "Executable exited with code $($process.ExitCode)" }
          if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }

      - name: Generate CycloneDX SBOM
        shell: pwsh
        working-directory: src
        run: python -m cyclonedx_py environment --output-format JSON --output-file "../ForensicPack-${{ github.ref_name }}-sbom.cdx.json"

      - name: Package release artifact and checksum
        shell: pwsh
        run: |
          $artifactName = "ForensicPack-${{ github.ref_name }}-windows"
          Compress-Archive -Path "src/dist/ForensicPack/*" -DestinationPath "$artifactName.zip" -Force
          $hash = (Get-FileHash "$artifactName.zip" -Algorithm SHA256).Hash
          "$hash *$artifactName.zip" | Out-File "$artifactName.zip.sha256" -Encoding ascii
          "ARTIFACT_PATH=$artifactName.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CHECKSUM_PATH=$artifactName.zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SBOM_PATH=ForensicPack-${{ github.ref_name }}-sbom.cdx.json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: forensicpack-windows-${{ github.ref_name }}
          path: |
            ${{ env.ARTIFACT_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ env.SBOM_PATH }}

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ARTIFACT_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ env.SBOM_PATH }}
