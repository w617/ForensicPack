name: Release Windows EXE

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths:
      - "src/release_version.txt"
      - ".github/workflows/release-windows.yml"

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = (Get-Content "src/release_version.txt" -Raw).Trim()
          if (-not $version) { throw "Release version not found in src/release_version.txt" }
          $releaseTag = "v$version"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne $releaseTag) {
            throw "Tag ${{ github.ref_name }} does not match application version $version"
          }
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build executable and run tests
        shell: pwsh
        working-directory: src
        run: ./scripts/build_windows.ps1

      - name: Smoke launch packaged executable
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "src/dist/ForensicPack/ForensicPack.exe" -PassThru
          Start-Sleep -Seconds 4
          if ($process.HasExited -and $process.ExitCode -ne 0) { throw "Executable exited with code $($process.ExitCode)" }
          if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }

      - name: Generate CycloneDX SBOM
        shell: pwsh
        working-directory: src
        run: python -m cyclonedx_py environment --output-format JSON --output-file "../ForensicPack-${{ env.RELEASE_TAG }}-sbom.cdx.json"

      - name: Package release artifact and checksum
        shell: pwsh
        run: |
          $artifactName = "ForensicPack-${{ env.RELEASE_TAG }}-windows"
          Compress-Archive -Path "src/dist/ForensicPack/*" -DestinationPath "$artifactName.zip" -Force
          $hash = (Get-FileHash "$artifactName.zip" -Algorithm SHA256).Hash
          "$hash *$artifactName.zip" | Out-File "$artifactName.zip.sha256" -Encoding ascii
          "ARTIFACT_PATH=$artifactName.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CHECKSUM_PATH=$artifactName.zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SBOM_PATH=ForensicPack-${{ env.RELEASE_TAG }}-sbom.cdx.json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: forensicpack-windows-${{ env.RELEASE_TAG }}
          path: |
            ${{ env.ARTIFACT_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ env.SBOM_PATH }}

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ForensicPack ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            ${{ env.ARTIFACT_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ env.SBOM_PATH }}
