name: Pip Audit Diagnostic

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  audit:
    name: audit-${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - pytest==9.0.1
          - pytest-cov==7.0.0
          - pyinstaller==6.16.0
          - reportlab==4.4.4
          - cryptography==46.0.3
          - ruff==0.14.10
          - mypy==1.19.0
          - bandit==1.9.2
          - pip-audit==2.10.0
          - cyclonedx-bom==7.2.1
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install auditor
        run: python -m pip install --quiet pip-audit==2.10.0
      - name: Audit ${{ matrix.package }}
        run: python -m pip_audit --requirement <(printf '%s\n' '${{ matrix.package }}')
        shell: bash
