name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: src/requirements-dev.txt
      - name: Install dependencies
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: src
        run: python -m pytest -q --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.os }}-py${{ matrix.python-version }}
          path: src/test-results.xml

  quality:
    name: Quality and security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt
      - name: Install dependencies
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Critical lint checks
        run: python -m ruff check .
      - name: Type analysis
        continue-on-error: true
        run: python -m mypy src/engine.py src/core_v2.py src/models.py src/sidecars.py
      - name: Static security scan
        working-directory: src
        shell: bash
        run: |
          find . -type f -name '*.py' ! -name 'test_*.py' ! -path './build/*' ! -path './dist/*' -print0 |
            xargs -0 python -m bandit -ll
      - name: Dependency audit
        working-directory: src
        run: python -m pip_audit -r requirements-dev.txt

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt
      - name: Install dependencies
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run coverage
        working-directory: src
        run: python -m pytest --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=coverage-test-results.xml
      - name: Upload coverage diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            src/coverage.xml
            src/coverage-test-results.xml

  windows-build:
    name: Windows packaged executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements-dev.txt
      - name: Build and test packaged application
        shell: pwsh
        run: ./src/scripts/build_windows.ps1
      - name: Confirm executable launches
        shell: pwsh
        run: |
          if (-not (Test-Path "src/dist/ForensicPack/ForensicPack.exe")) { throw "Executable missing" }
          $process = Start-Process -FilePath "src/dist/ForensicPack/ForensicPack.exe" -PassThru
          Start-Sleep -Seconds 4
          if ($process.HasExited -and $process.ExitCode -ne 0) { throw "Executable exited with code $($process.ExitCode)" }
          if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
