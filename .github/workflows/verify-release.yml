name: Verify Published Release

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/verify-release.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < src/release_version.txt)"
          test -n "$version"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Download published assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          for attempt in $(seq 1 12); do
            rm -rf release-assets
            mkdir release-assets
            if gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Release assets were not available after 12 attempts."
              exit 1
            fi
            sleep 10
          done

      - name: Verify package, checksum, and SBOM
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          package="ForensicPack-${RELEASE_TAG}-windows.zip"
          checksum="${package}.sha256"
          sbom="ForensicPack-${RELEASE_TAG}-sbom.cdx.json"
          test -s "release-assets/$package"
          test -s "release-assets/$checksum"
          test -s "release-assets/$sbom"
          (cd release-assets && sha256sum -c "$checksum")
          python - <<'PY'
          import json
          from pathlib import Path
          files = list(Path("release-assets").glob("*-sbom.cdx.json"))
          if len(files) != 1:
              raise SystemExit("Expected exactly one CycloneDX SBOM")
          payload = json.loads(files[0].read_text(encoding="utf-8"))
          if payload.get("bomFormat") != "CycloneDX":
              raise SystemExit("Invalid CycloneDX SBOM")
          print(f"Verified SBOM: {files[0].name}")
          PY

      - name: Record release verification
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          gh pr comment 3 --repo "$GITHUB_REPOSITORY" --body "Release **${RELEASE_TAG}** verified successfully. The Windows ZIP, SHA-256 checksum, and CycloneDX SBOM were downloaded from the published GitHub Release; the package checksum matched and the SBOM parsed as CycloneDX. Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
